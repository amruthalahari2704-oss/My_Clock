<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 id="clock"></h1>
        <script>
            function myclock(){
                let now=new Date();
                let h=now.getHours();
                let m=now.getMinutes();
                let s=now.getSeconds();
                let mer="AM"
                if(h>12){
                    h=h-1;
                }
                if(h>=12) {
                    mer="PM";
                }
                if(h<10){
                    h='0'+h;
                }
                if(m<10){
                    m='0'+m;
                }
                if(s<10){
                    s='0'+s;
                }
            document.getElementById("clock").innerHTML=h+ ":"+m+":"+s+":"+mer;
            }
            setInterval(myclock,1000);
            </script>
    </body>
